resources:
  - name: TAYLORL_GitRepo
    type: GitRepo
    configuration:
      gitProvider: myBB
      path: ~taylorl/maven-hello-world
      branches:
        include: node
  - name: buildInfoLinux
    type: BuildInfo
    configuration:
      sourceArtifactory: s_artifactory

pipelines:
  - name: TAYLORL
    steps:
      - name: TAYLORL_1
        type: NpmBuild
        configuration:
          resolverRepo: "test-automation-npm-remote"
          integrations:
            - name: s_artifactory
          inputResources:
            - name: nodeRepoLinux
      - name: TAYLORL_2
        type: NpmPublish
        configuration:
          autoPublishBuildInfo: true
          deployerRepo: "test-automation-npm-local"
          forceXrayScan: true
          integrations:
            - name: s_artifactory
          inputSteps:
            - name: build_npm
          outputResources:
            - name: buildInfoLinux
