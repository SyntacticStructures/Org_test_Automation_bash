resources:
  - name: TAYLORL_GitRepo
    type: GitRepo
    configuration:
      gitProvider: s_gitHub
      path: SyntacticStructures/Org_test_Automation_bash
      branches:
        include: master
  - name: buildInfoLinux
    type: BuildInfo
    configuration:
      sourceArtifactory: s_artifactory

pipelines:
  - name: TAYLORL
    steps:
      - name: TAYLORL_1
        type: NpmBuild
        configuration:
          sourceLocation: "tests/npm"
          resolverRepo: "test-automation-npm-remote"
          integrations:
            - name: s_artifactory
          inputResources:
            - name: TAYLORL_GitRepo
      - name: TAYLORL_2
        type: NpmPublish
        configuration:
          autoPublishBuildInfo: true
          deployerRepo: "test-automation-npm-local"
          forceXrayScan: true
          integrations:
            - name: s_artifactory
          inputSteps:
            - name: build_npm
          outputResources:
            - name: buildInfoLinux
