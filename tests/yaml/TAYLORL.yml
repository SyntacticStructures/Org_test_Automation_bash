resources:
  - name: nodeRepoLinux
    type: GitRepo
    configuration:
      gitProvider: myBB
      path: ~taylorl/maven-hello-world
      branches:
        include: node
  - name: buildInfoLinux
    type: BuildInfo
    configuration:
      sourceArtifactory: s_artifactory

pipelines:
  - name: TAYLORL_LINUX
    steps:
      - name: build_npm
        type: NpmBuild
        configuration:
          resolverRepo: "npm"
          integrations:
            - name: s_artifactory
          inputResources:
            - name: nodeRepoLinux
      - name: publish_npm
        type: NpmPublish
        configuration:
          autoPublishBuildInfo: true
          deployerRepo: "npm-target"
          forceXrayScan: true
          integrations:
            - name: s_artifactory
          inputSteps:
            - name: build_npm
          outputResources:
            - name: buildInfoLinux
