resources:
  - name: nodeRepo
    type: GitRepo
    configuration:
      gitProvider: myBB
      path: ~taylorl/maven-hello-world
      branches:
        include: node

pipelines:
  - name: TAYLORL
    steps:
      - name: build_npm
        type: NpmBuild
        configuration:
          integrations:
            - name: s_artifactory
          inputResources:
            - name: nodeRepo
      - name: publish_npm
        type: NpmPublish
        configuration:
          forceXrayScan: "true"
          integrations:
            - name: s_artifactory
          inputResources:
            - name: build_npm
