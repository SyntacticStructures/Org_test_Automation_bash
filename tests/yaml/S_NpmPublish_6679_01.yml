resources:
  - name: S_NpmPublish_6679_01_GitRepo
    type: GitRepo
    configuration:
      gitProvider: s_gitHub
      # TODO change these to template vars
#      path: { { .Values.GitHub.Org_test_Automation_bash.path } }
#      branches:
#        include: {{gitBranch}}
      path: SyntacticStructures/Org_test_Automation_bash
      branches:
        include: master
  - name: S_NpmPublish_6679_01_buildInfo
    type: BuildInfo
    configuration:
      sourceArtifactory: s_artifactory

pipelines:
  - name: S_NpmPublish_6679_01
    steps:
      - name: S_NpmPublish_6679_01_1
        type: NpmBuild
        configuration:
          sourceLocation: "tests/npm"
          resolverRepo: "test-automation-npm-remote"
          integrations:
            - name: s_artifactory
          inputResources:
            - name: S_NpmPublish_6679_01_GitRepo
      - name: S_NpmPublish_6679_01_2
        type: NpmPublish
        configuration:
          autoPublishBuildInfo: true
          deployerRepo: "test-automation-npm-local"
          forceXrayScan: true
          integrations:
            - name: s_artifactory
          inputSteps:
            - name: S_NpmPublish_6679_01_1
          outputResources:
            - name: S_NpmPublish_6679_01_buildInfo
