template: true
valuesFilePath: ../values/gitRepoValues.yml

resources:
  - name: S_MvnBuild_6679_001_GitRepo
    type: GitRepo
    configuration:
      gitProvider: s_gitHub
      path: {{ .Values.GitHub.Org_test_Automation_bash.path }}
      branches:
        include: {{gitBranch}}

pipelines:
  - name: S_MvnBuild_6679_001
    configuration:
      integrations:
        - name: s_artifactory
    steps:
      - name: S_MvnBuild_6679_001_1
        type: MvnBuild
        configuration:
          autoPublishBuildInfo: true
          forceXrayScan: true
          inputResources:
            - name: S_MvnBuild_6679_001_GitRepo
