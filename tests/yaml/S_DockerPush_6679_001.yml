template: true
valuesFilePath: ../values/gitRepoValues.yml

resources:
  - name: S_DockerPush_6679_001_GitRepo
    type: GitRepo
    configuration:
      gitProvider: s_gitHub
      path: {{ .Values.GitHub.Org_test_Automation_bash.path }}
      branches:
        include: {{gitBranch}}
  - name: S_DockerPush_6679_001_buildInfo
    type: BuildInfo
    configuration:
      sourceArtifactory: s_artifactory

pipelines:
  - name: S_DockerPush_6679_001
    steps:
      - name: S_DockerPush_6679_001_1
        type: DockerBuild
        configuration:
          affinityGroup: S_DockerPush_6679_001
          dockerImageName: s_dockerpush_6679
          dockerImageTag: ${run_id}
          inputResources:
            - name: S_DockerPush_6679_001_GitRepo
          integrations:
            - name: s_artifactory
      - name: S_DockerPush_6679_001_2
        type: DockerPush
        configuration:
          autoPublishBuildInfo: true
          forceXrayScan: true
          affinityGroup: S_DockerPush_6679_001
          targetRepository: test-automation-docker-local
          inputSteps:
            - name: S_DockerPush_6679_001_1
          integrations:
            - name: s_artifactory
          outputResources:
            - name: S_DockerPush_6679_001_buildInfo
